name: Auto Tag Main

on:
  workflow_dispatch:
    inputs:
      parent_release_id:
        description: 'PostPlus parent release manifest id authorizing this tag.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    if: inputs.parent_release_id != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Create package version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_SHA="$(git rev-list -n 1 "$TAG")"
            if [ "$TAG_SHA" = "$GITHUB_SHA" ]; then
              echo "Tag $TAG already points at this commit."
              exit 0
            fi

            echo "::error::Tag $TAG already exists at $TAG_SHA. Bump package.json version before merging another release commit to main."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
